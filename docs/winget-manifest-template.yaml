# LexVaultMD — WinGet Manifest Template
#
# This file is a template for submitting LexVaultMD to the Windows Package Manager
# Community Repository (winget-pkgs). It is included with Professional and Team tier
# licenses as part of the enterprise deployment documentation set.
#
# Before submission:
#   1. Fill in all [PLACEHOLDER] values.
#   2. Generate the SHA-256 hash of the installer:
#        certutil -hashfile LexVaultMD-Setup-<version>.msi SHA256
#   3. Submit a pull request to: https://github.com/microsoft/winget-pkgs
#      following the contribution guide at:
#      https://github.com/microsoft/winget-pkgs/blob/master/CONTRIBUTING.md
#   4. Test locally before submission:
#        winget install --manifest ./manifests/n/Nexacrawl/LexVaultMD/
#
# WinGet manifest schema reference:
#   https://github.com/microsoft/winget-pkgs/blob/master/doc/manifest/schema/1.6.0/
#
# Manifest version: 1.6.0 (current as of 2026)

---
# Installer manifest
PackageIdentifier: Nexacrawl.LexVaultMD
PackageVersion: "[VERSION]"         # e.g. 1.1.0 — must match the GitHub Release tag
PackageLocale: en-US
MinimumOSVersion: "10.0.17763.0"    # Windows 10 1809 (minimum for modern winget)
InstallerType: msi
Scope: machine                       # machine = installs for all users (SCCM/Intune friendly)
InstallModes:
  - silent
  - silentWithProgress
InstallerSwitches:
  Silent: /quiet /norestart
  SilentWithProgress: /passive /norestart
  Log: /log "[TEMP]\LexVaultMD-install.log"
UpgradeBehavior: install
Installers:
  - Architecture: x64
    InstallerUrl: "https://github.com/Kevork-Nexacrawl-dev/lex-vault-md/releases/download/v[VERSION]/LexVaultMD-Setup-[VERSION]-x64.msi"
    InstallerSha256: "[SHA256_OF_MSI]"  # certutil -hashfile <file> SHA256
ManifestType: installer
ManifestVersion: 1.6.0

---
# Default locale manifest
PackageIdentifier: Nexacrawl.LexVaultMD
PackageVersion: "[VERSION]"
PackageLocale: en-US
Publisher: Nexacrawl
PublisherUrl: "https://github.com/Kevork-Nexacrawl-dev/lex-vault-md"
PublisherSupportUrl: "https://github.com/Kevork-Nexacrawl-dev/lex-vault-md/issues"
PrivacyUrl: "https://github.com/Kevork-Nexacrawl-dev/lex-vault-md#data-residency"
Author: Nexacrawl
PackageName: LexVaultMD
PackageUrl: "https://github.com/Kevork-Nexacrawl-dev/lex-vault-md"
License: BSL-1.1
LicenseUrl: "https://github.com/Kevork-Nexacrawl-dev/lex-vault-md/blob/main/LICENSE"
Copyright: "© 2026 Nexacrawl"
ShortDescription: "Offline legal PDF to Markdown CLI for litigation and e-discovery workflows."
Description: |
  LexVaultMD converts legal PDFs into clean, structured Markdown or JSON — locally,
  on CPU, without transmitting document content to any external service or API.

  Designed for law firms, litigation support teams, eDiscovery vendors, and legal ops
  practitioners who need verifiable offline document processing for confidential matters.

  Features include smart heading detection from the PDF transform matrix, multi-column
  layout support, table extraction, artifact removal (headers/footers/watermarks), batch
  conversion, JSON output mode (--json), and optional OCR via local Tesseract.js (--ocr).

  Runs on Windows, macOS, and Linux. Requires Node.js 18+.
Moniker: lex-vault-md
Tags:
  - pdf
  - markdown
  - legal
  - cli
  - e-discovery
  - litigation
  - ocr
  - offline
  - document-conversion
  - nexacrawl
Documentation:
  - DocumentLabel: README
    DocumentUrl: "https://github.com/Kevork-Nexacrawl-dev/lex-vault-md#readme"
  - DocumentLabel: Data Residency
    DocumentUrl: "https://github.com/Kevork-Nexacrawl-dev/lex-vault-md#data-residency"
  - DocumentLabel: Offline Architecture
    DocumentUrl: "https://github.com/Kevork-Nexacrawl-dev/lex-vault-md/blob/main/docs/offline-architecture.md"
  - DocumentLabel: Vendor Security Packet
    DocumentUrl: "https://github.com/Kevork-Nexacrawl-dev/lex-vault-md/blob/main/docs/vendor-security-packet.md"
ReleaseNotesUrl: "https://github.com/Kevork-Nexacrawl-dev/lex-vault-md/releases/tag/v[VERSION]"
ManifestType: defaultLocale
ManifestVersion: 1.6.0

---
# Version manifest
PackageIdentifier: Nexacrawl.LexVaultMD
PackageVersion: "[VERSION]"
DefaultLocale: en-US
ManifestType: version
ManifestVersion: 1.6.0

